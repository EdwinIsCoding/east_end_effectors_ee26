recording_root: recordings

robot:
  enabled: true
  bind_ip: 0.0.0.0
  port: 28081
  with_receive_metadata: false
  flush_every: 50
  fsync_every: 0
  print_hz: 0.1

cameras:
  - id: third_person
    enabled: true
    backend: realsense
    role: third_person
    obs_key: observation.images.third_person_d405
    camera_name: third_person_d405
    serial: "130322273529"
    color_width: 1280
    color_height: 720
    depth_width: 640
    depth_height: 480
    fps: 30
    exposure: 12000
    auto_exposure: false
    depth: false
    align_depth: true
    bag: false
    video_codec: mp4v
    print_hz: 0.1

  - id: wrist
    enabled: true
    backend: realsense
    role: wrist
    obs_key: observation.images.top
    camera_name: wrist_d405
    serial: "130322270179"
    color_width: 1280
    color_height: 720
    depth_width: 640
    depth_height: 480
    fps: 30
    exposure: 12000
    auto_exposure: false
    depth: false
    align_depth: true
    bag: false
    video_codec: mp4v
    print_hz: 0.1

  - id: zed_wrist
    enabled: false
    backend: zed
    role: wrist
    obs_key_left: observation.images.top
    obs_key_right: observation.images.ee_zed_m_right
    camera_name: ee_zed_m
    left_camera_name: ee_zed_m_left
    right_camera_name: ee_zed_m_right
    serial: 0
    resolution: HD720
    fps: 30
    width: 0
    height: 0
    exposure: 70
    auto_exposure: false
    svo: false
    svo_compression: H264
    depth: false
    video_codec: mp4v
    print_hz: 1.0
