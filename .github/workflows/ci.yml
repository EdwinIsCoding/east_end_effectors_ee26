name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff · challenge2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff check
        run: ruff check challenge2/src

  challenge2:
    name: Challenge 2 — tests + coverage (≥90%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: challenge2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-ci.txt
      - name: Run tests with coverage gate
        run: |
          pytest tests -q --cov=src --cov-branch \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=90
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: challenge2/coverage.xml
          flags: challenge2
          name: challenge2-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  training:
    name: Training pipeline — CI-faithful tests (no GPU / no lerobot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run CI-faithful test suite
        run: |
          pytest tests -m "not gpu" \
            --deselect tests/test_smolvla_fork.py::test_policy_class_importable -q
